name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set build info
        id: build
        run: |
          COMMIT=$(echo "$GITHUB_SHA" | cut -c1-9)
          DATE=$(date -u +%Y-%m-%d)

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAG="$VERSION"
            PRERELEASE=false
          else
            VERSION="preview"
            TAG="preview+${COMMIT}.${DATE}"
            PRERELEASE=true
          fi

          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT"         >> "$GITHUB_OUTPUT"
          echo "date=$DATE"             >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"               >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Vet
        run: go vet ./...

      - name: Build binaries
        env:
          LDFLAGS: >-
            -s -w
            -X 'btp-open-cli/cmd.Version=${{ steps.build.outputs.version }}'
            -X 'btp-open-cli/cmd.Commit=${{ steps.build.outputs.commit }}'
            -X 'btp-open-cli/cmd.Date=${{ steps.build.outputs.date }}'
        run: |
          mkdir dist
          GOOS=linux   GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/bo-linux-amd64    .
          GOOS=linux   GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/bo-linux-arm64    .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/bo-darwin-amd64   .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/bo-darwin-arm64   .
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/bo-windows-amd64.exe .

      - name: Extract release notes
        run: |
          awk '/^## /{found=1; next} found && /^---/{exit} found{print}' CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' > release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build.outputs.tag }}
          name: ${{ steps.build.outputs.tag }}
          body_path: release-notes.md
          prerelease: ${{ steps.build.outputs.prerelease }}
          files: dist/*
          fail_on_unmatched_files: true
